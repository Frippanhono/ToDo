name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  test-build:
    name: Lint • Typecheck • Unit tests • Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          # Vite 2 + Jest 28 funkar fint på Node 18; 20 går också
          node-version: 18
          cache: npm

      - name: Install deps (CI clean)
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck (TS)
        run: npm run typecheck --if-present

      - name: Unit tests (Jest + RTL)
        run: npm run test:unit:ci

      - name: Build (Vite)
        run: npm run build --if-present

  e2e:
    name: Cypress E2E
    # Kör BARA om både Cypress-konfig och minst en spec finns
    if: ${{ hashFiles('cypress.config.{js,ts,mjs,cjs}') != '' && hashFiles('cypress/**/*.cy.{js,ts,jsx,tsx}') != '' }}
    runs-on: ubuntu-latest
    needs: test-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install deps (CI clean)
        run: npm ci

      # Använder ert script "serve" + Cypress CI-script från package.json
      - name: Run Cypress (start-server-and-test)
        run: npm run test:e2e:ci