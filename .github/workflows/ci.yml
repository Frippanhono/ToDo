name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  test-build:
    name: Unit & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies (CI clean)
        run: npm ci
        env:
          HUSKY: 0

      - name: Run ESLint
        run: npm run lint --if-present

      - name: Run Jest tests
        run: npm run test:unit:ci

      - name: Build project
        run: npm run build

  e2e:
    name: Cypress E2E
    runs-on: ubuntu-latest
    needs: test-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies (CI clean)
        run: npm ci
        env:
          HUSKY: 0

      - name: Run Cypress (start-server-and-test)
        run: npm run test:e2e:ci
        
